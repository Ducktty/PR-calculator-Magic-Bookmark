<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR Calculator Pro V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .glass-card { background: rgba(20, 20, 20, 0.8); border: 1px solid #222; }
        .input-field { background: #111; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; color: #fff; }
        .input-field:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        .btn-primary { background: #3b82f6; color: white; padding: 16px; border-radius: 12px; font-weight: 700; width: 100%; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .label-text { font-size: 10px; color: #666; margin-bottom: 4px; display: block; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="pb-10">

<div id="app" class="max-w-md mx-auto p-4">
    <header class="flex justify-between items-center py-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-white">PR CALCULATOR <span class="text-blue-500">v8</span></h1>
        <button onclick="toggleHistory()" class="p-2 glass-card rounded-full text-gray-400"><i data-lucide="history" class="w-5 h-5"></i></button>
    </header>

    <div id="calculator-view" class="space-y-4">
        <div class="flex gap-2 p-1 bg-zinc-900 rounded-xl">
            <button id="mode-pe" onclick="setMode('PE')" class="flex-1 py-2 rounded-lg text-xs font-bold bg-blue-600 text-white">PE MODE</button>
            <button id="mode-pb" onclick="setMode('PB')" class="flex-1 py-2 rounded-lg text-xs font-bold text-zinc-500">PB MODE</button>
        </div>

        <div class="glass-card p-5 rounded-2xl space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div><label class="label-text">Ticker</label><input type="text" id="stockName" class="input-field" placeholder="TSLA"></div>
                <div><label class="label-text" id="vLabel">PE Ratio</label><input type="number" step="any" id="valuationValue" class="input-field" placeholder="372.87"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="label-text">ROE %</label><input type="number" step="any" id="roe" class="input-field" placeholder="4.9"></div>
                <div><label class="label-text">Payout %</label><input type="number" step="any" id="payout" class="input-field" placeholder="0"></div>
            </div>
        </div>

        <details class="glass-card p-4 rounded-2xl" open>
            <summary class="text-[10px] font-black text-zinc-500 uppercase cursor-pointer mb-2">Red Flag Analysis (Latest TTM)</summary>
            <div class="grid grid-cols-1 gap-4 pt-2">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="label-text">Total Liab</label><input type="number" id="liabilities" class="input-field"></div>
                    <div><label class="label-text">Total Assets</label><input type="number" id="assets" class="input-field"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="label-text">Op Income</label><input type="number" id="opIncome" class="input-field"></div>
                    <div><label class="label-text">Net Income</label><input type="number" id="netIncome" class="input-field"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="label-text">Goodwill+Inv</label><input type="number" id="goodwill" class="input-field"></div>
                    <div><label class="label-text">Op Cash Flow</label><input type="number" id="opCashFlow" class="input-field"></div>
                </div>
            </div>
        </details>

        <button onclick="calculatePR()" class="btn-primary shadow-blue-500/20">RUN DIAGNOSIS</button>
    </div>

    <div id="result-view" class="hidden space-y-6 animate-in slide-in-from-bottom-4 duration-500">
        <div class="glass-card p-10 rounded-3xl text-center border-t-4 border-t-blue-500">
            <h2 class="text-zinc-500 text-[10px] font-black uppercase tracking-widest mb-4">Market Profit Rate (PR)</h2>
            <div id="pr-value" class="text-7xl font-black mb-4">0.00</div>
            <div id="pr-level" class="inline-block px-6 py-2 rounded-full text-xs font-black uppercase tracking-tighter">---</div>
        </div>
        <div id="redflags-container" class="space-y-2"></div>
        <div class="flex gap-3">
            <button onclick="saveHistory()" class="btn-primary bg-zinc-800 text-white flex-1">SAVE</button>
            <button onclick="resetApp()" class="btn-primary bg-zinc-900 text-zinc-500 flex-1">BACK</button>
        </div>
    </div>

    <div id="history-view" class="hidden">
        <div class="flex justify-between items-center mb-6"><h2 class="text-xl font-black">RECORDS</h2><button onclick="clearAllHistory()" class="text-xs text-red-500 font-bold uppercase">Clear</button></div>
        <div id="history-list" class="space-y-3"></div>
        <button onclick="toggleHistory()" class="w-full mt-6 p-4 text-zinc-600 font-bold text-xs uppercase">Close</button>
    </div>
</div>

<script>
let currentMode = 'PE';
let history = JSON.parse(localStorage.getItem('pr_history') || '[]');

window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const payload = params.get('payload');
    if (payload) {
        try {
            const data = JSON.parse(decodeURIComponent(escape(atob(payload.replace(/ /g, '+')))));
            
            // 处理单位加权：检测到是 Financials 页面传来的数据时，自动补齐千位
            const multiplyFactor = data._isThousands ? 1000 : 1;
            
            const fieldMap = {
                'stockName': 'stockName', 'pe': 'valuationValue', 'pb': 'valuationValue',
                'roe': 'roe', 'payout': 'payout', 'liab': 'liabilities',
